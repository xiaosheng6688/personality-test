<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人格探索 - 发现真实的自己</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .question-container {
            display: none;
        }
        .question-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
            color: #555;
        }
        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateX(5px);
        }
        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .result-container {
            display: none;
            text-align: center;
        }
        .result-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        .personality-type {
            font-size: 3em;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
        }
        .personality-name {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 15px;
        }
        .personality-desc {
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
            text-align: left;
        }
        .traits {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .trait {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
        }
        .trait-label {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 5px;
        }
        .trait-value {
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
        }
        .share-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 12px;
        }
        .share-title {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 15px;
        }
        .share-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .share-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.3s ease;
        }
        .share-btn:hover {
            transform: scale(1.05);
        }
        .share-wechat { background: #07c160; color: white; }
        .share-weibo { background: #e6162d; color: white; }
        .share-qq { background: #12b7f5; color: white; }
        .share-link { background: #667eea; color: white; }
        .start-screen {
            text-align: center;
        }
        .start-screen p {
            color: #666;
            margin: 20px 0;
            line-height: 1.8;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .feature {
            padding: 20px;
            background: #f8f9ff;
            border-radius: 12px;
        }
        .feature-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .feature-title {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 5px;
        }
        .feature-desc {
            font-size: 0.9em;
            color: #888;
        }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
            .features { grid-template-columns: 1fr; }
            .traits { grid-template-columns: 1fr; }
            .personality-type { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container">

            <div class="features">

            <p>本测试包含 20 道精选题目，约需 3-5 分钟完成<br>所有数据仅存储在本地，保护你的隐私安全</p>
            <button class="btn" onclick="startTest()">开始测试</button>
        </div>

            </div>

            <div class="personality-type" id="personalityType"></div>
            <div class="personality-name" id="personalityName"></div>
            <div class="traits" id="traits"></div>

            <div class="share-section">

                <div class="share-buttons">
                    <button class="share-btn share-wechat" onclick="shareToWeChat()">微信</button>
                    <button class="share-btn share-weibo" onclick="shareToWeibo()">微博</button>
                    <button class="share-btn share-qq" onclick="shareToQQ()">QQ</button>
                    <button class="share-btn share-link" onclick="copyLink()">复制链接</button>
                </div>
            </div>
            
            <button class="btn" onclick="retakeTest()" style="margin-top: 20px;">重新测试</button>
        </div>

        // 人格类型定义
        const personalityTypes = {

        let currentQuestion = 0;
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
        let answers = [];

        function startTest() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('testContainer').style.display = 'block';
            renderQuestion();
        }

        function renderQuestion() {
            const container = document.getElementById('questions');
            const q = questions[currentQuestion];
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            
            document.getElementById('progressFill').style.width = progress + '%';
            
            let html = `
                <div class="question-container active">
                    <div class="question">${currentQuestion + 1}. ${q.question}</div>
                    <div class="options">
            `;
            
            q.options.forEach((opt, idx) => {
                html += `<div class="option" onclick="selectOption(${idx})">${opt.text}</div>`;
            });
            
            html += '</div></div>';
            container.innerHTML = html;
        }

        function selectOption(idx) {
            const q = questions[currentQuestion];
            const opt = q.options[idx];
            
            scores[opt.type] += opt.score;
            answers.push({ question: q.question, answer: opt.text });
            
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('testContainer').style.display = 'none';
            document.getElementById('resultContainer').classList.add('active');
            
            // 计算人格类型
            const type = [
                scores.E >= scores.I ? 'E' : 'I',
                scores.S >= scores.N ? 'S' : 'N',
                scores.T >= scores.F ? 'T' : 'F',
                scores.J >= scores.P ? 'J' : 'P'
            ].join('');
            
            const personality = personalityTypes[type];
            
            document.getElementById('personalityType').textContent = type;
            document.getElementById('personalityName').textContent = personality.name;
            document.getElementById('personalityDesc').textContent = personality.desc;
            
            // 计算百分比
            const totalEI = scores.E + scores.I;
            const totalSN = scores.S + scores.N;
            const totalTF = scores.T + scores.F;
            const totalJP = scores.J + scores.P;
            
            const traits = [
                { label: '外向 (E)', value: Math.round((scores.E / totalEI) * 100) + '%' },
                { label: '内向 (I)', value: Math.round((scores.I / totalEI) * 100) + '%' },
                { label: '实感 (S)', value: Math.round((scores.S / totalSN) * 100) + '%' },
                { label: '直觉 (N)', value: Math.round((scores.N / totalSN) * 100) + '%' },
                { label: '思考 (T)', value: Math.round((scores.T / totalTF) * 100) + '%' },
                { label: '情感 (F)', value: Math.round((scores.F / totalTF) * 100) + '%' },
                { label: '判断 (J)', value: Math.round((scores.J / totalJP) * 100) + '%' },
                { label: '知觉 (P)', value: Math.round((scores.P / totalJP) * 100) + '%' }
            ];
            
            document.getElementById('traits').innerHTML = traits.map(t => `
                <div class="trait">
                    <div class="trait-label">${t.label}</div>
                    <div class="trait-value">${t.value}</div>
                </div>
            `).join('');
            
            // 保存到本地存储
            localStorage.setItem('personalityResult', JSON.stringify({
                type,
                name: personality.name,
                scores,
                answers,
                date: new Date().toISOString()
            }));
        }

        function retakeTest() {
            currentQuestion = 0;
            scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            answers = [];
            document.getElementById('resultContainer').classList.remove('active');
            document.getElementById('startScreen').style.display = 'block';
        }

        function shareToWeChat() {
            alert('请截图分享至微信朋友圈！');
        }

        function shareToWeibo() {
            const text = `我的人格类型是：${document.getElementById('personalityType').textContent}（${document.getElementById('personalityName').textContent}）快来测试你的人格类型吧！`;
            window.open(`https://service.weibo.com/share/share.php?title=${encodeURIComponent(text)}`);
        }

        function shareToQQ() {
            const text = `我的人格类型是：${document.getElementById('personalityType').textContent}（${document.getElementById('personalityName').textContent}）快来测试你的人格类型吧！`;
            window.open(`https://connect.qq.com/widget/shareqq/index.html?title=${encodeURIComponent(text)}`);
        }

        function copyLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('链接已复制到剪贴板！');
            });
        }
    </script>
</body>
</html>
